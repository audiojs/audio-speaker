name: publish
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            pkg: speaker-darwin-arm64
          - os: macos-13
            pkg: speaker-darwin-x64
          - os: ubuntu-latest
            pkg: speaker-linux-x64
          - os: ubuntu-24.04-arm
            pkg: speaker-linux-arm64
          - os: windows-latest
            pkg: speaker-win32-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts
      - run: npx node-gyp@latest rebuild
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkg }}
          path: build/Release/speaker.node
