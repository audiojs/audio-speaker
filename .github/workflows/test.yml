name: test
on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install --ignore-scripts
      - run: npx node-gyp@latest rebuild
      - run: npm test
      - if: matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: speaker-${{ matrix.os }}
          path: build/Release/speaker.node
